<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форум на Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 { font-size: 28px; }

        .auth-section {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .auth-section input {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255,255,255,0.9);
            min-width: 150px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-primary {
            background: #ff6b6b;
            color: white;
        }

        .btn-primary:hover {
            background: #ff5252;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-danger {
            background: #ff4757;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #ff3838;
        }

        .btn-like {
            background: #ff6b6b;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-like:hover {
            transform: scale(1.1);
        }

        .btn-like.liked {
            background: #ff4757;
        }

        .main-content { padding: 30px; }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .category-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s;
            text-align: center;
        }

        .category-card:hover { transform: translateY(-5px); }

        .topic-item {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin-bottom: 15px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .topic-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .comment-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
            position: relative;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 12px;
        }

        .delete-btn:hover {
            background: #ff3838;
        }

        .error-message {
            background: #fff5f5;
            color: #c92a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #c92a2a;
        }

        .success-message {
            background: #f0fff4;
            color: #2f9e44;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #2f9e44;
        }

        .loading { text-align: center; padding: 20px; color: #666; }

        @media (max-width: 768px) {
            .header { flex-direction: column; }
            .auth-section { flex-direction: column; width: 100%; }
            .auth-section input { width: 100%; }
            .categories-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💬 Форум</h1>
            <div class="auth-section" id="authSection">
                <input type="email" id="emailInput" placeholder="Email">
                <input type="password" id="passwordInput" placeholder="Пароль (мин. 6)">
                <button class="btn btn-primary" onclick="signUp()">Регистрация</button>
                <button class="btn btn-secondary" onclick="signIn()">Войти</button>
            </div>
            <div class="auth-section" id="userSection" style="display: none;">
                <span id="userName" style="font-weight: bold;"></span>
                <button class="btn btn-secondary" onclick="signOut()">Выйти</button>
            </div>
        </div>

        <div class="main-content">
            <div id="messageArea"></div>
            <div id="content"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.9/dist/purify.min.js"></script>

    <script>
        // Firebase инициализация
        const firebaseConfig = {
            apiKey: "AIzaSyD_my6koKFw4nWBdMnlyw2yBjs3Yr68IN8",
            authDomain: "forumcooleeeeee.firebaseapp.com",
            projectId: "forumcooleeeeee",
            storageBucket: "forumcooleeeeee.firebasestorage.app",
            messagingSenderId: "844874727079",
            appId: "1:844874727079:web:2955f36ebd7d48fde3e582"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentView = 'categories';
        let selectedCategory = null;
        let selectedTopic = null;

        auth.onAuthStateChanged((user) => {
            currentUser = user;
            updateAuthUI();
            loadContent();
        });

        function updateAuthUI() {
            const authSection = document.getElementById('authSection');
            const userSection = document.getElementById('userSection');
            
            if (currentUser) {
                authSection.style.display = 'none';
                userSection.style.display = 'flex';
                document.getElementById('userName').textContent = `👤 ${DOMPurify.sanitize(currentUser.email)}`;
            } else {
                authSection.style.display = 'flex';
                userSection.style.display = 'none';
            }
        }

        async function signUp() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                showMessage('Введите email и пароль', 'error');
                return;
            }
            
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                showMessage('Регистрация успешна!', 'success');
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        async function signIn() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                showMessage('Введите email и пароль', 'error');
                return;
            }
            
            try {
                await auth.signInWithEmailAndPassword(email, password);
                showMessage('Вход выполнен!', 'success');
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        async function signOut() {
            await auth.signOut();
            currentView = 'categories';
            loadContent();
        }

        async function loadContent() {
            if (currentView === 'categories') {
                await loadCategories();
            } else if (currentView === 'topics') {
                await loadTopics();
            } else if (currentView === 'topic-detail') {
                await loadTopicDetail();
            }
        }

        async function loadCategories() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Загрузка...</div>';
            
            try {
                const snapshot = await db.collection('categories').orderBy('order').get();
                
                if (snapshot.empty) {
                    const defaultCategories = [
                        { name: 'Общий', description: 'Обсуждение всего', order: 1, topicCount: 0 },
                        { name: 'Технологии', description: 'IT и технологии', order: 2, topicCount: 0 },
                        { name: 'Игры', description: 'Видеоигры и развлечения', order: 3, topicCount: 0 },
                        { name: 'Оффтоп', description: 'Разговоры на любые темы', order: 4, topicCount: 0 }
                    ];
                    
                    for (const cat of defaultCategories) {
                        await db.collection('categories').add(cat);
                    }
                    return loadCategories();
                }
                
                for (const doc of snapshot.docs) {
                    const categoryId = doc.id;
                    const topicsSnapshot = await db.collection('topics')
                        .where('categoryId', '==', categoryId)
                        .get();
                    
                    const actualCount = topicsSnapshot.size;
                    const currentCount = doc.data().topicCount || 0;
                    
                    if (actualCount !== currentCount) {
                        await db.collection('categories').doc(categoryId).update({
                            topicCount: actualCount
                        });
                    }
                }
                
                const updatedSnapshot = await db.collection('categories').orderBy('order').get();
                
                let html = '<h2>Категории форума</h2><div class="categories-grid">';
                
                updatedSnapshot.forEach(doc => {
                    const cat = doc.data();
                    html += `
                        <div class="category-card" onclick="viewTopics('${doc.id}', '${DOMPurify.sanitize(cat.name)}')">
                            <h3>${DOMPurify.sanitize(cat.name)}</h3>
                            <p>${DOMPurify.sanitize(cat.description || '')}</p>
                            <p>Тем: ${cat.topicCount || 0}</p>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `<div class="error-message">Ошибка: ${DOMPurify.sanitize(error.message)}</div>`;
            }
        }

        function viewTopics(categoryId, categoryName) {
            selectedCategory = { id: categoryId, name: categoryName };
            currentView = 'topics';
            loadContent();
        }

        async function loadTopics() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Загрузка тем...</div>';
            
            try {
                const snapshot = await db.collection('topics').get();
                
                const topics = [];
                snapshot.forEach(doc => {
                    const topic = { id: doc.id, ...doc.data() };
                    if (topic.categoryId === selectedCategory.id) {
                        topics.push(topic);
                    }
                });
                
                topics.sort((a, b) => {
                    const dateA = a.createdAt?.toDate?.() || new Date(0);
                    const dateB = b.createdAt?.toDate?.() || new Date(0);
                    return dateB - dateA;
                });
                
                let html = `
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>${DOMPurify.sanitize(selectedCategory.name)}</h2>
                        <div>
                            <button class="btn btn-secondary" onclick="viewCategories()">← Назад</button>
                            ${currentUser ? '<button class="btn btn-primary" onclick="showCreateTopicForm()">Создать тему</button>' : ''}
                        </div>
                    </div>
                `;
                
                if (topics.length === 0) {
                    html += '<p>Тем пока нет. Будьте первым!</p>';
                } else {
                    topics.forEach(topic => {
                        const likes = topic.likes || [];
                        const hasLiked = currentUser && likes.includes(currentUser.uid);
                        const canDelete = currentUser && currentUser.uid === topic.authorId;
                        
                        html += `
                            <div class="topic-item">
                                <div style="display: flex; justify-content: space-between; align-items: start;">
                                    <div style="flex: 1;" onclick="viewTopicDetail('${topic.id}')">
                                        <h3>${DOMPurify.sanitize(topic.title)}</h3>
                                        <p style="color: #666; font-size: 12px; margin: 10px 0;">
                                            Автор: ${DOMPurify.sanitize(topic.authorName)} | ${formatDate(topic.createdAt)}
                                        </p>
                                    </div>
                                    ${canDelete ? `
                                        <button class="btn-danger" onclick="event.stopPropagation(); deleteTopic('${topic.id}')">
                                            🗑 Удалить
                                        </button>
                                    ` : ''}
                                </div>
                                <div style="display: flex; gap: 10px; align-items: center; margin-top: 10px;" onclick="viewTopicDetail('${topic.id}')">
                                    <button class="btn-like ${hasLiked ? 'liked' : ''}" 
                                            onclick="event.stopPropagation(); toggleLike('${topic.id}')">
                                        ${hasLiked ? '❤️' : '🤍'} ${likes.length}
                                    </button>
                                    <span style="color: #666;">💬 ${topic.replyCount || 0}</span>
                                    <span style="color: #666;">👁 ${topic.viewCount || 0}</span>
                                </div>
                            </div>
                        `;
                    });
                }
                
                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `<div class="error-message">Ошибка: ${DOMPurify.sanitize(error.message)}</div>`;
            }
        }

        async function deleteTopic(topicId) {
            if (!confirm('Вы уверены, что хотите удалить эту тему?')) return;
            
            try {
                const topicDoc = await db.collection('topics').doc(topicId).get();
                if (!topicDoc.exists) {
                    showMessage('Тема не найдена', 'error');
                    return;
                }
                
                const topic = topicDoc.data();
                
                const commentsSnapshot = await db.collection('comments')
                    .where('topicId', '==', topicId)
                    .get();
                
                const batch = db.batch();
                commentsSnapshot.forEach(doc => batch.delete(doc.ref));
                
                batch.delete(db.collection('topics').doc(topicId));
                
                await batch.commit();
                
                await updateCategoryTopicCount(topic.categoryId);
                
                showMessage('Тема удалена!', 'success');
                loadTopics();
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        async function updateCategoryTopicCount(categoryId) {
            try {
                const snapshot = await db.collection('topics')
                    .where('categoryId', '==', categoryId)
                    .get();
                
                await db.collection('categories').doc(categoryId).update({
                    topicCount: snapshot.size
                });
            } catch (error) {
                console.error('Ошибка обновления счетчика:', error);
            }
        }

        function viewCategories() {
            currentView = 'categories';
            loadContent();
        }

        function showCreateTopicForm() {
            if (!currentUser) {
                showMessage('Войдите чтобы создать тему', 'error');
                return;
            }
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <h2>Создать тему</h2>
                    <div class="form-group">
                        <label>Заголовок</label>
                        <input type="text" id="topicTitle" placeholder="Заголовок темы">
                    </div>
                    <div class="form-group">
                        <label>Содержание</label>
                        <textarea id="topicContent" placeholder="Текст темы"></textarea>
                    </div>
                    <div style="display: flex; gap: 10px; justify-content: flex-end;">
                        <button class="btn btn-secondary" onclick="closeModal()">Отмена</button>
                        <button class="btn btn-primary" onclick="createTopic()">Создать</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        async function createTopic() {
            const titleRaw = document.getElementById('topicTitle')?.value.trim();
            const contentRaw = document.getElementById('topicContent')?.value.trim();
            
            if (!titleRaw || !contentRaw) {
                showMessage('Заполните все поля', 'error');
                return;
            }
            
            // Очистка от XSS перед сохранением
            const title = DOMPurify.sanitize(titleRaw);
            const content = DOMPurify.sanitize(contentRaw);
            
            if (title.length === 0 || content.length === 0) {
                showMessage('Недопустимые символы в тексте', 'error');
                return;
            }
            
            try {
                await db.collection('topics').add({
                    title,
                    content,
                    categoryId: selectedCategory.id,
                    authorId: currentUser.uid,
                    authorName: DOMPurify.sanitize(currentUser.email),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    replyCount: 0,
                    viewCount: 0,
                    likes: [],
                    isPinned: false
                });
                
                await updateCategoryTopicCount(selectedCategory.id);
                
                closeModal();
                showMessage('Тема создана!', 'success');
                loadTopics();
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        async function toggleLike(topicId) {
            if (!currentUser) {
                showMessage('Войдите чтобы ставить лайки', 'error');
                return;
            }
            
            try {
                const topicRef = db.collection('topics').doc(topicId);
                const doc = await topicRef.get();
                const topic = doc.data();
                let likes = topic.likes || [];
                
                if (likes.includes(currentUser.uid)) {
                    likes = likes.filter(id => id !== currentUser.uid);
                } else {
                    likes.push(currentUser.uid);
                }
                
                await topicRef.update({ likes });
                loadTopics();
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        function viewTopicDetail(topicId) {
            selectedTopic = topicId;
            currentView = 'topic-detail';
            loadContent();
        }

        async function loadTopicDetail() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Загрузка темы...</div>';
            
            try {
                const topicDoc = await db.collection('topics').doc(selectedTopic).get();
                if (!topicDoc.exists) {
                    content.innerHTML = '<div class="error-message">Тема не найдена</div>';
                    return;
                }
                
                const topic = { id: topicDoc.id, ...topicDoc.data() };
                
                await db.collection('topics').doc(selectedTopic).update({
                    viewCount: firebase.firestore.FieldValue.increment(1)
                });
                
                const commentsSnapshot = await db.collection('comments')
                    .where('topicId', '==', selectedTopic)
                    .orderBy('createdAt', 'asc')
                    .get();
                
                const comments = [];
                commentsSnapshot.forEach(doc => {
                    comments.push({ id: doc.id, ...doc.data() });
                });
                
                const likes = topic.likes || [];
                const hasLiked = currentUser && likes.includes(currentUser.uid);
                const canDelete = currentUser && currentUser.uid === topic.authorId;
                
                let html = `
                    <button class="btn btn-secondary" onclick="viewTopics('${topic.categoryId}', '${DOMPurify.sanitize(selectedCategory?.name || '')}')">← Назад</button>
                    
                    <div style="margin: 20px 0; padding: 20px; border: 2px solid #e0e0e0; border-radius: 10px; position: relative;">
                        ${canDelete ? `
                            <button class="delete-btn" onclick="deleteTopic('${topic.id}')">🗑 Удалить тему</button>
                        ` : ''}
                        <h2>${DOMPurify.sanitize(topic.title)}</h2>
                        <p style="color: #666; font-size: 12px; margin: 10px 0;">
                            Автор: ${DOMPurify.sanitize(topic.authorName)} | ${formatDate(topic.createdAt)} | 👁 ${topic.viewCount || 0}
                        </p>
                        <p style="line-height: 1.6; margin: 15px 0;">${DOMPurify.sanitize(topic.content)}</p>
                        <button class="btn-like ${hasLiked ? 'liked' : ''}" onclick="toggleLike('${topic.id}')">
                            ${hasLiked ? '❤️' : '🤍'} ${likes.length}
                        </button>
                    </div>
                    
                    <h3>Комментарии (${comments.length})</h3>
                `;
                
                comments.forEach(comment => {
                    const commentLikes = comment.likes || [];
                    const hasLikedComment = currentUser && commentLikes.includes(currentUser.uid);
                    const canDeleteComment = currentUser && currentUser.uid === comment.authorId;
                    
                    html += `
                        <div class="comment-item">
                            ${canDeleteComment ? `
                                <button class="delete-btn" onclick="deleteComment('${comment.id}')">🗑</button>
                            ` : ''}
                            <p style="font-size: 12px; color: #666;">
                                👤 ${DOMPurify.sanitize(comment.authorName)} | ${formatDate(comment.createdAt)}
                            </p>
                            <p style="margin: 10px 0;">${DOMPurify.sanitize(comment.content)}</p>
                            <button class="btn-like ${hasLikedComment ? 'liked' : ''}" 
                                    onclick="toggleCommentLike('${comment.id}')"
                                    style="font-size: 12px; padding: 5px 15px;">
                                ${hasLikedComment ? '❤️' : '🤍'} ${commentLikes.length}
                            </button>
                        </div>
                    `;
                });
                
                if (currentUser) {
                    html += `
                        <div style="margin-top: 20px;">
                            <h4>Оставить комментарий</h4>
                            <textarea id="commentContent" placeholder="Ваш комментарий" 
                                      style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; margin: 10px 0;"></textarea>
                            <button class="btn btn-primary" onclick="addComment()">Отправить</button>
                        </div>
                    `;
                }
                
                content.innerHTML = html;
            } catch (error) {
                content.innerHTML = `<div class="error-message">Ошибка: ${DOMPurify.sanitize(error.message)}</div>`;
            }
        }

        async function deleteComment(commentId) {
            if (!confirm('Удалить комментарий?')) return;
            
            try {
                const commentDoc = await db.collection('comments').doc(commentId).get();
                if (!commentDoc.exists) return;
                
                const comment = commentDoc.data();
                
                await db.collection('comments').doc(commentId).delete();
                
                const commentsSnapshot = await db.collection('comments')
                    .where('topicId', '==', selectedTopic)
                    .get();
                
                await db.collection('topics').doc(selectedTopic).update({
                    replyCount: commentsSnapshot.size
                });
                
                showMessage('Комментарий удален!', 'success');
                loadTopicDetail();
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        async function addComment() {
            const contentRaw = document.getElementById('commentContent')?.value.trim();
            
            if (!contentRaw) {
                showMessage('Введите текст комментария', 'error');
                return;
            }
            
            // Очистка от XSS перед сохранением
            const content = DOMPurify.sanitize(contentRaw);
            
            if (content.length === 0) {
                showMessage('Недопустимые символы в комментарии', 'error');
                return;
            }
            
            try {
                await db.collection('comments').add({
                    topicId: selectedTopic,
                    content,
                    authorId: currentUser.uid,
                    authorName: DOMPurify.sanitize(currentUser.email),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: []
                });
                
                const commentsSnapshot = await db.collection('comments')
                    .where('topicId', '==', selectedTopic)
                    .get();
                
                await db.collection('topics').doc(selectedTopic).update({
                    replyCount: commentsSnapshot.size
                });
                
                showMessage('Комментарий добавлен!', 'success');
                loadTopicDetail();
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        async function toggleCommentLike(commentId) {
            if (!currentUser) return;
            
            try {
                const commentRef = db.collection('comments').doc(commentId);
                const doc = await commentRef.get();
                const comment = doc.data();
                let likes = comment.likes || [];
                
                if (likes.includes(currentUser.uid)) {
                    likes = likes.filter(id => id !== currentUser.uid);
                } else {
                    likes.push(currentUser.uid);
                }
                
                await commentRef.update({ likes });
                loadTopicDetail();
            } catch (error) {
                showMessage('Ошибка: ' + error.message, 'error');
            }
        }

        function closeModal() {
            const modal = document.querySelector('.modal');
            if (modal) modal.remove();
        }

        function formatDate(timestamp) {
            if (!timestamp) return 'Только что';
            const date = timestamp?.toDate ? timestamp.toDate() : new Date();
            return date.toLocaleString('ru-RU');
        }

        function showMessage(text, type = 'info') {
            const area = document.getElementById('messageArea');
            const div = document.createElement('div');
            
            if (type === 'error') {
                div.className = 'error-message';
            } else if (type === 'success') {
                div.className = 'success-message';
            } else {
                div.style.cssText = `
                    background: #e3f2fd;
                    color: #1976d2;
                    padding: 15px;
                    border-radius: 8px;
                    margin-bottom: 15px;
                    border-left: 4px solid #1976d2;
                `;
            }
            
            div.textContent = text;
            area.innerHTML = '';
            area.appendChild(div);
            
            setTimeout(() => {
                if (div.parentNode) {
                    div.style.opacity = '0';
                    div.style.transition = 'opacity 0.3s';
                    setTimeout(() => div.remove(), 300);
                }
            }, 3000);
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                closeModal();
            }
        });

        loadContent();
        console.log('Форум готов! ✅ Защита от XSS включена');
    </script>
</body>
</html>
